name: Daily FMCSA Import

on:
  schedule:
    # Runs every day at 6:00 PM UTC after the daily FMCSA Company Census refresh.
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'FMCSA import source'
        required: false
        default: 'company-census'
        type: choice
        options:
          - company-census
          - carrier-daily
      limit:
        description: 'Maximum newest records to import'
        required: false
        default: '5000'

concurrency:
  group: daily-fmcsa-import
  cancel-in-progress: false

jobs:
  import:
    name: Import newest FMCSA carriers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve inputs
        id: vars
        shell: bash
        run: |
          SOURCE="${{ github.event.inputs.source || 'company-census' }}"
          LIMIT="${{ github.event.inputs.limit || '5000' }}"
          echo "source=${SOURCE}" >> "$GITHUB_OUTPUT"
          echo "limit=${LIMIT}" >> "$GITHUB_OUTPUT"

      - name: Trigger FMCSAPULL import
        env:
          FMCSAPULL_BASE_URL: ${{ secrets.FMCSAPULL_BASE_URL }}
          FMCSAPULL_ADMIN_API_KEY: ${{ secrets.FMCSAPULL_ADMIN_API_KEY }}
          SOURCE: ${{ steps.vars.outputs.source }}
          LIMIT: ${{ steps.vars.outputs.limit }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FMCSAPULL_BASE_URL}" ]; then
            echo "Missing GitHub secret: FMCSAPULL_BASE_URL"
            exit 1
          fi

          if [ -z "${FMCSAPULL_ADMIN_API_KEY}" ]; then
            echo "Missing GitHub secret: FMCSAPULL_ADMIN_API_KEY"
            exit 1
          fi

          BASE_URL="${FMCSAPULL_BASE_URL%/}"

          echo "Checking FMCSA source before import"
          curl --fail-with-body \
            --url "${BASE_URL}/admin/datasets/check?source=${SOURCE}" \
            --header "x-admin-api-key: ${FMCSAPULL_ADMIN_API_KEY}"

          PAYLOAD=$(printf '{"source":"%s","limit":%s}' "$SOURCE" "$LIMIT")
          echo "Importing newest FMCSA records: source=${SOURCE}, limit=${LIMIT}"
          curl --fail-with-body \
            --request POST \
            --url "${BASE_URL}/admin/import" \
            --header "content-type: application/json" \
            --header "x-admin-api-key: ${FMCSAPULL_ADMIN_API_KEY}" \
            --data "$PAYLOAD"
