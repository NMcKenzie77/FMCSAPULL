name: Weekly FMCSA Import

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC.
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      source:
        description: 'FMCSA import source'
        required: false
        default: 'carrier-daily'
        type: choice
        options:
          - carrier-daily
          - carrier-all-history
          - company-census
      limit:
        description: 'Maximum records to import'
        required: false
        default: '5000'

concurrency:
  group: weekly-fmcsa-import
  cancel-in-progress: false

jobs:
  import:
    name: Run weekly FMCSA import
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve inputs
        id: vars
        shell: bash
        run: |
          SOURCE="${{ github.event.inputs.source || 'carrier-daily' }}"
          LIMIT="${{ github.event.inputs.limit || '5000' }}"
          echo "source=${SOURCE}" >> "$GITHUB_OUTPUT"
          echo "limit=${LIMIT}" >> "$GITHUB_OUTPUT"

      - name: Trigger FMCSAPULL import
        env:
          FMCSAPULL_BASE_URL: ${{ secrets.FMCSAPULL_BASE_URL }}
          FMCSAPULL_ADMIN_API_KEY: ${{ secrets.FMCSAPULL_ADMIN_API_KEY }}
          SOURCE: ${{ steps.vars.outputs.source }}
          LIMIT: ${{ steps.vars.outputs.limit }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FMCSAPULL_BASE_URL}" ]; then
            echo "Missing GitHub secret: FMCSAPULL_BASE_URL"
            exit 1
          fi

          if [ -z "${FMCSAPULL_ADMIN_API_KEY}" ]; then
            echo "Missing GitHub secret: FMCSAPULL_ADMIN_API_KEY"
            exit 1
          fi

          BASE_URL="${FMCSAPULL_BASE_URL%/}"
          PAYLOAD=$(printf '{"source":"%s","limit":%s}' "$SOURCE" "$LIMIT")

          echo "Triggering FMCSA import: source=${SOURCE}, limit=${LIMIT}"
          curl --fail-with-body \
            --request POST \
            --url "${BASE_URL}/admin/import" \
            --header "content-type: application/json" \
            --header "x-admin-api-key: ${FMCSAPULL_ADMIN_API_KEY}" \
            --data "$PAYLOAD"

      - name: Refresh FMCSA scores
        env:
          FMCSAPULL_BASE_URL: ${{ secrets.FMCSAPULL_BASE_URL }}
          FMCSAPULL_ADMIN_API_KEY: ${{ secrets.FMCSAPULL_ADMIN_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="${FMCSAPULL_BASE_URL%/}"

          echo "Refreshing scores after import"
          curl --fail-with-body \
            --request POST \
            --url "${BASE_URL}/admin/score/refresh" \
            --header "content-type: application/json" \
            --header "x-admin-api-key: ${FMCSAPULL_ADMIN_API_KEY}" \
            --data '{}'
